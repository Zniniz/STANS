version: "3.9"

services:
# ── STANS instance 1 ──────────────────────────────────────────
  stans-1:
    image: notnani/stans-app:latest
    container_name: stans-1
    restart: always
    ports:
      - "8081:80"          # each instance gets a unique host port
    deploy:
      resources:
        limits:
          memory: 128m     # divide budget across 3 instances
          cpus: "0.3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── STANS instance 2 ──────────────────────────────────────────
  stans-2:
    image: notnani/stans-app:latest
    container_name: stans-2
    restart: always
    ports:
      - "8082:80"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── STANS instance 3 ──────────────────────────────────────────
  stans-3:
    image: notnani/stans-app:latest
    container_name: stans-3
    restart: always
    ports:
      - "8083:80"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── cAdvisor: container metrics ────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true      # required: needs host access to read container stats
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Node exporter: host metrics ────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"


  # ── Prometheus: metrics database ───────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Grafana: dashboards ────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

# ── Loki: log storage ─────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: loki
    user: "root"
    restart: always
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Promtail: log collector ────────────────────────────────────
  # Tails all Docker container log files and ships them to Loki.
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: always
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  prometheus_data:    # persists metrics across container restarts
  grafana_data:       # persists dashboards and settings
  loki_data:          # persists log storage
