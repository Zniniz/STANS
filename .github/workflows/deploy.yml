name: Build & Deploy STANS

# 1. Smarter Triggers: Run on main pushes, version tags, AND pull requests
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/stans-app

permissions:
  contents: read
  packages: write
  security-events: write

# JOB 1 — Validate the app actually builds
jobs:
  lint-and-tests:
    name: Run Automated Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with: 
          node-versions: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build


# JOB 2 — Docker: build image and push to Docker Hub
  docker:
    needs: validate
    runs-on: ubuntu-latest
    
    # only push from main not PR
    if: github.ref == 'refs/heads/main'   

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

# JOB 3 — Deploy: SSH into server and restart the container
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Pull the new image
          script: |
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop stans || true
            docker rm stans   || true
            
            docker run -d \
              --name stans \
              --restart=always \
              -p 80:80 \
              ${{ env.IMAGE_NAME }}:latest