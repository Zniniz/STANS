name: Build & Deploy STANS

# 1. Smarter Triggers: Run on main pushes, version tags, AND pull requests
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/stans-app

permissions:
  contents: read
  packages: write
  security-events: write

# JOB 1 — Validate the app actually builds
jobs:
  variable:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build


# JOB 2 — Docker: build image and push to Docker Hub
  docker:
    needs: variable
    runs-on: ubuntu-latest
    
    # only push from main not PR
    if: github.ref == 'refs/heads/main'   

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

# JOB 3 — Deploy: SSH into server and restart the container
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/stans
            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans

# JOB 4 — Kubernetes deploys
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Kubernetes via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Rolling update — pulls new image and replaces pods one by one
            # Zero downtime: readiness probe ensures old pod stays up until new one is ready
            kubectl set image deployment/stans \
              stans=${{ env.IMAGE_NAME }}:${{ github.sha }} \
              -n stans

            # Wait for rollout to complete
            kubectl rollout status deployment/stans -n stans --timeout=120s
