name: Build & Deploy STANS

# Smarter Triggers: Run on main pushes, version tags, AND pull requests
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/stans-app

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # JOB 1 — Validate the app actually builds
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

  # JOB 2 — Docker: build image and push to Docker Hub
  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    # only push from main not PR
    if: github.ref == 'refs/heads/main'   
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # JOB 3 — Kubernetes Deploy (Zero Downtime)
  deploy-k8s:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Kubernetes via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Pull the latest infrastructure files from GitHub
            cd /home/ubuntu/stans
            git pull origin main
            
            # 2. Apply any changes made to the k8s config files (like HPA or Ingress)
            kubectl apply -f k8s/

            # 3. Rolling update — zero downtime pod replacement with the new image
            kubectl set image deployment/stans \
              stans=${{ env.IMAGE_NAME }}:${{ github.sha }} \
              -n stans

            # 4. Wait for rollout to complete safely
            kubectl rollout status deployment/stans -n stans --timeout=120s